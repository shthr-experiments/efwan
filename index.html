<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>F1 China GP 2026</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#0a0f1f,#020617);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:1000px;
max-width:95%;
}

.player{
position:relative;
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:15px;
box-shadow:0 0 50px rgba(0,0,0,.7);
backdrop-filter:blur(8px);
}

iframe{
width:100%;
height:540px;
border:none;
border-radius:10px;
background:black;
}

.title{
position:absolute;
top:25px;
left:30px;
background:rgba(0,0,0,.6);
padding:8px 14px;
border-radius:8px;
font-weight:bold;
}

.live{
position:absolute;
top:25px;
right:30px;
background:red;
padding:6px 12px;
border-radius:6px;
font-weight:bold;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:.5;}
100%{opacity:1;}
}

.footer{
margin-top:10px;
text-align:center;
opacity:.7;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="player">

<div class="title">
F1 China GP 2026
</div>

<div class="live">
LIVE
</div>

<iframe
src="https://pooembed.eu/embed/f1/2026/china/race"
allowfullscreen>
</iframe>

</div>

<div class="footer">
Live race broadcast
</div>

</div>

</body>

</html>
